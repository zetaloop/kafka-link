name: kafka-link

x-kafka-common: &kafka-common
  image: apache/kafka:4.0.0
  restart: unless-stopped
  networks:
    - kafka-link
  environment: &kafka-common-environment
    CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: "1"
    KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: "1"
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_LOG_DIRS: /var/lib/kafka/data

services:
  kafka-1:
    <<: *kafka-common
    hostname: kafka-1
    container_name: kafka-link-kafka-1
    ports:
      - "29092:9092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-environment
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:19092,CONTROLLER://kafka-1:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:19092,PLAINTEXT_HOST://localhost:29092
    healthcheck:
      test:
        ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-1:19092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-2:
    <<: *kafka-common
    hostname: kafka-2
    container_name: kafka-link-kafka-2
    ports:
      - "39092:9092"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-environment
      KAFKA_NODE_ID: "2"
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:19092,CONTROLLER://kafka-2:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:19092,PLAINTEXT_HOST://localhost:39092
    healthcheck:
      test:
        ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-2:19092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-3:
    <<: *kafka-common
    hostname: kafka-3
    container_name: kafka-link-kafka-3
    ports:
      - "49092:9092"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-environment
      KAFKA_NODE_ID: "3"
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:19092,CONTROLLER://kafka-3:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:19092,PLAINTEXT_HOST://localhost:49092
    healthcheck:
      test:
        ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-3:19092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-init:
    image: apache/kafka:4.0.0
    container_name: kafka-link-kafka-init
    restart: "no"
    networks:
      - kafka-link
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    volumes:
      - ./infra/kafka:/init:ro
    command: ["bash", "/init/create-topics.sh"]

  redis:
    image: redis:7.4-alpine
    container_name: kafka-link-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    networks:
      - kafka-link
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  kafka-link:
    name: kafka-link

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
