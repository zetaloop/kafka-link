name: kafka-link

x-python-service: &python-service
  restart: unless-stopped
  networks:
    - kafka-link
  depends_on:
    kafka-init:
      condition: service_completed_successfully
    redis:
      condition: service_healthy
  environment: &python-service-environment
    KAFKA_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19092,kafka-3:19092
    REDIS_URL: redis://redis:6379/0
    REQUEST_TIMEOUT_SECONDS: "10"

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.9.6
  restart: unless-stopped
  networks:
    - kafka-link
  depends_on:
    zookeeper-1:
      condition: service_started
    zookeeper-2:
      condition: service_started
    zookeeper-3:
      condition: service_started
  environment: &kafka-common-environment
    KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_LOG_DIRS: /var/lib/kafka/data

services:
  zookeeper-1:
    image: zookeeper:3.9
    container_name: kafka-link-zookeeper-1
    restart: unless-stopped
    hostname: zookeeper-1
    networks:
      - kafka-link
    environment:
      ZOO_MY_ID: "1"
      ZOO_SERVERS: server.1=zookeeper-1:2888:3888;2181 server.2=zookeeper-2:2888:3888;2181 server.3=zookeeper-3:2888:3888;2181
    volumes:
      - zookeeper-1-data:/data
      - zookeeper-1-datalog:/datalog

  zookeeper-2:
    image: zookeeper:3.9
    container_name: kafka-link-zookeeper-2
    restart: unless-stopped
    hostname: zookeeper-2
    networks:
      - kafka-link
    environment:
      ZOO_MY_ID: "2"
      ZOO_SERVERS: server.1=zookeeper-1:2888:3888;2181 server.2=zookeeper-2:2888:3888;2181 server.3=zookeeper-3:2888:3888;2181
    volumes:
      - zookeeper-2-data:/data
      - zookeeper-2-datalog:/datalog

  zookeeper-3:
    image: zookeeper:3.9
    container_name: kafka-link-zookeeper-3
    restart: unless-stopped
    hostname: zookeeper-3
    networks:
      - kafka-link
    environment:
      ZOO_MY_ID: "3"
      ZOO_SERVERS: server.1=zookeeper-1:2888:3888;2181 server.2=zookeeper-2:2888:3888;2181 server.3=zookeeper-3:2888:3888;2181
    volumes:
      - zookeeper-3-data:/data
      - zookeeper-3-datalog:/datalog

  kafka-1:
    <<: *kafka-common
    hostname: kafka-1
    container_name: kafka-link-kafka-1
    ports:
      - "29092:9092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-environment
      KAFKA_BROKER_ID: "1"
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:19092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:19092,PLAINTEXT_HOST://localhost:29092
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-1:19092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-2:
    <<: *kafka-common
    hostname: kafka-2
    container_name: kafka-link-kafka-2
    ports:
      - "39092:9092"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-environment
      KAFKA_BROKER_ID: "2"
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:19092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:19092,PLAINTEXT_HOST://localhost:39092
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-2:19092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-3:
    <<: *kafka-common
    hostname: kafka-3
    container_name: kafka-link-kafka-3
    ports:
      - "49092:9092"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-environment
      KAFKA_BROKER_ID: "3"
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:19092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:19092,PLAINTEXT_HOST://localhost:49092
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-3:19092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.9.6
    container_name: kafka-link-kafka-init
    restart: "no"
    networks:
      - kafka-link
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    volumes:
      - ./infra/kafka:/init:ro
    command: ["bash", "/init/create-topics.sh"]

  redis:
    image: redis:7.4-alpine
    container_name: kafka-link-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    networks:
      - kafka-link
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    <<: *python-service
    container_name: kafka-link-api
    build:
      context: .
      dockerfile: ./infra/python-service.Dockerfile
      args:
        PACKAGE_NAME: kafka-link-api
    command: ["uvicorn", "kafka_link_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  collector-weather:
    <<: *python-service
    container_name: kafka-link-collector-weather
    build:
      context: .
      dockerfile: ./infra/python-service.Dockerfile
      args:
        PACKAGE_NAME: kafka-link-collector-weather
    command: ["python", "-m", "kafka_link_collector_weather.main"]
    environment:
      <<: *python-service-environment
      POLL_INTERVAL_SECONDS: "60"

  collector-airquality:
    <<: *python-service
    container_name: kafka-link-collector-airquality
    build:
      context: .
      dockerfile: ./infra/python-service.Dockerfile
      args:
        PACKAGE_NAME: kafka-link-collector-airquality
    command: ["python", "-m", "kafka_link_collector_airquality.main"]
    environment:
      <<: *python-service-environment
      POLL_INTERVAL_SECONDS: "60"

  collector-earthquake:
    <<: *python-service
    container_name: kafka-link-collector-earthquake
    build:
      context: .
      dockerfile: ./infra/python-service.Dockerfile
      args:
        PACKAGE_NAME: kafka-link-collector-earthquake
    command: ["python", "-m", "kafka_link_collector_earthquake.main"]
    environment:
      <<: *python-service-environment
      POLL_INTERVAL_SECONDS: "60"

  processor:
    <<: *python-service
    container_name: kafka-link-processor
    build:
      context: .
      dockerfile: ./infra/python-service.Dockerfile
      args:
        PACKAGE_NAME: kafka-link-processor
    command: ["python", "-m", "kafka_link_processor.main"]

  alert-engine:
    <<: *python-service
    container_name: kafka-link-alert-engine
    build:
      context: .
      dockerfile: ./infra/python-service.Dockerfile
      args:
        PACKAGE_NAME: kafka-link-alert-engine
    command: ["python", "-m", "kafka_link_alert_engine.main"]

  analytics:
    <<: *python-service
    container_name: kafka-link-analytics
    build:
      context: .
      dockerfile: ./infra/python-service.Dockerfile
      args:
        PACKAGE_NAME: kafka-link-analytics
    command: ["python", "-m", "kafka_link_analytics.main"]

  web:
    container_name: kafka-link-web
    restart: unless-stopped
    networks:
      - kafka-link
    depends_on:
      api:
        condition: service_started
    build:
      context: .
      dockerfile: ./infra/web.Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "4173:4173"

networks:
  kafka-link:
    name: kafka-link

volumes:
  zookeeper-1-data:
  zookeeper-1-datalog:
  zookeeper-2-data:
  zookeeper-2-datalog:
  zookeeper-3-data:
  zookeeper-3-datalog:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
